name: Deploy Book

on:
  push:
    branches: ["main"]
    # paths: ["src/**"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Dummy HTML
        run: |
          mkdir -p dist
          echo "<!DOCTYPE html>" > dist/index.html
          echo "<html>" >> dist/index.html
          echo "<head><title>Dummy Page</title></head>" >> dist/index.html
          echo "<body><h1>This is a test deployment</h1></body>" >> dist/index.html
          echo "</html>" >> dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  
          destination_dir: EDGE
          force_orphan: true
